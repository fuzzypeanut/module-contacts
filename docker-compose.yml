services:
  # Serves the built remoteEntry.js to the shell
  contacts-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3002:80"
    depends_on:
      - contacts-api

  # Registers this module with the shell registry on startup
  contacts-registrar:
    build:
      context: .
      dockerfile: Dockerfile.registrar
    environment:
      REGISTRY_URL: ${REGISTRY_URL:-http://shell-registry:3100}
      MODULE_UI_URL: ${MODULE_UI_URL:-http://localhost:3002}
    depends_on:
      - contacts-ui

  # Contacts backend — REST + CardDAV (Rust/axum)
  contacts-api:
    build: ./api
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://contacts:contacts@contacts-db:5432/contacts}
      JWKS_URL: ${JWKS_URL:-http://authentik-server:9000/application/o/fuzzypeanut/.well-known/jwks.json}
      LISTEN_ADDR: 0.0.0.0:3003
    depends_on:
      contacts-db:
        condition: service_healthy

  # PostgreSQL — contacts module's own instance (standalone dev)
  # Production deployments consolidate into a shared DB (see fuzzypeanut/deploy)
  contacts-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contacts
      POSTGRES_USER: contacts
      POSTGRES_PASSWORD: ${CONTACTS_DB_PASSWORD:-contacts}
    volumes:
      - contacts-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contacts"]
      interval: 5s
      retries: 5

volumes:
  contacts-db:
